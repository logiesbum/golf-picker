<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⛳ Caddie — Golf Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#080d0b;font-family:'DM Sans',sans-serif;color:#e8f0eb}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0a0f0d}
::-webkit-scrollbar-thumb{background:#2d6a4f;border-radius:3px}

/* layout */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:210px;background:#0f1a14;border-right:1px solid #1a2e20;display:flex;flex-direction:column;flex-shrink:0}
#content{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{padding:12px 22px;border-bottom:1px solid #1a2e20;background:#0f1a14;flex-shrink:0}
#main{flex:1;overflow:auto;padding:18px}

/* sidebar */
.logo{padding:18px 17px 14px;border-bottom:1px solid #1a2e20}
.logo-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#d4af37}
.logo-sub{font-size:10px;color:#6b8f76;letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
nav{padding:9px 7px;flex:1}
.nav-btn{width:100%;display:flex;align-items:center;gap:8px;padding:9px 11px;background:transparent;border:none;border-left:2px solid transparent;border-radius:0 6px 6px 0;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:#6b8f76;margin-bottom:2px;transition:all .12s}
.nav-btn:hover{background:rgba(212,175,55,.07)}
.nav-btn.active{background:rgba(212,175,55,.12);border-left-color:#d4af37;color:#d4af37;font-weight:600}
.season-box{padding:12px 14px;border-top:1px solid #1a2e20}
.season-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px}
.season-row span:last-child{color:#d4af37;font-family:'DM Mono',monospace;font-weight:600;font-size:13px}
.sidebar-footer{padding:11px 12px;border-top:1px solid #1a2e20;display:flex;flex-direction:column;gap:7px}
.btn-refresh{padding:10px;background:linear-gradient(135deg,#2d6a4f,#1a3c2e);border:1px solid #2d6a4f;border-radius:7px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-refresh:disabled{opacity:.6;cursor:not-allowed}
.btn-settings{padding:7px;background:transparent;border:1px solid #1a2e20;border-radius:6px;color:#6b8f76;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.last-refresh{font-size:10px;color:#6b8f76;text-align:center}

/* cards */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
.stat-card{background:#0f1a14;border:1px solid #1a2e20;border-radius:11px;padding:16px 18px;transition:transform .18s,box-shadow .18s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.stat-num{font-family:'DM Mono',monospace;font-size:28px;font-weight:700;line-height:1}
.stat-label{font-size:13px;font-weight:500;margin-top:5px}
.stat-sub{font-size:11px;color:#6b8f76;margin-top:2px}

/* panels */
.panel{background:#0f1a14;border:1px solid #1a2e20;border-radius:11px;overflow:hidden}
.panel-header{padding:12px 16px;border-bottom:1px solid #1a2e20;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:14px}

/* table */
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;font-size:11px;color:#6b8f76;letter-spacing:.05em;text-transform:uppercase;font-family:'DM Mono',monospace;background:#0a1a10;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#d4af37}
td{padding:9px 12px;font-size:13px;border-bottom:1px solid #1a2e20}
tr:hover td{background:rgba(45,106,79,.13)}

/* tier badges */
.tier{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;border:1px solid}
.tier-Elite{background:#0d2218;border-color:#52b788;color:#a7f3d0}
.tier-Contender{background:#0d1a2c;border-color:#3b82f6;color:#93c5fd}
.tier-HotForm{background:#2a0f03;border-color:#f97316;color:#fdba74}
.tier-Sleeper{background:#1e1600;border-color:#d4af37;color:#fde68a}
.tier-Value{background:#120f28;border-color:#8b5cf6;color:#c4b5fd}
.tier-LIVWatch{background:#280f1e;border-color:#ec4899;color:#f9a8d4}
.tier-Specialist{background:#061a10;border-color:#34d399;color:#6ee7b7}

/* misc */
.used-badge{display:inline-block;margin-left:5px;font-size:10px;background:#ef4444;color:#fff;padding:1px 5px;border-radius:4px;font-weight:600}
.prob-bar{height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;flex:1}
.prob-fill{height:100%;background:linear-gradient(90deg,#2d6a4f,#d4af37);border-radius:4px;transition:width .6s ease}
.search-inp{width:100%;padding:9px 13px;background:#0f1a14;border:1px solid #1a2e20;border-radius:7px;color:#e8f0eb;font-size:13px;margin-bottom:13px;font-family:'DM Sans',sans-serif}
.search-inp:focus{outline:none;border-color:#d4af37}
.filter-btn{padding:5px 12px;border-radius:6px;border:1px solid #1a2e20;background:transparent;color:#6b8f76;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer}
.filter-btn.active{border-color:#d4af37;background:rgba(212,175,55,.1);color:#d4af37}

/* schedule cards */
.sched-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sched-card{background:#0f1a14;border:1px solid #1a2e20;border-radius:11px;padding:14px;position:relative;overflow:hidden;transition:transform .18s;cursor:default}
.sched-card:hover{transform:translateY(-2px)}
.sched-card.major{border-color:rgba(212,175,55,.4)}
.sched-card.curr{border-color:rgba(82,183,136,.3)}
.sched-tag{position:absolute;top:0;right:0;padding:3px 9px;font-size:9px;font-weight:700;letter-spacing:.06em}
.sched-tag.major{background:rgba(212,175,55,.15);color:#d4af37}
.sched-tag.curr{background:rgba(82,183,136,.15);color:#86efac}
.week-label{font-size:11px;color:#6b8f76;font-family:'DM Mono',monospace;margin-bottom:4px}
.sched-name{font-size:13px;font-weight:700;margin-bottom:2px;padding-right:55px}
.sched-course{font-size:11px;color:#6b8f76;margin-bottom:10px}
.pick-chip{padding:8px 10px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid #1a2e20}
.pick-chip.t10{background:rgba(82,183,136,.1);border-color:#52b788}
.pick-chip.cut{background:rgba(239,68,68,.08);border-color:#ef4444}
.pick-chip-name{font-size:12px;font-weight:600}
.pick-chip-sub{display:flex;gap:8px;margin-top:3px;font-size:11px;font-family:'DM Mono',monospace;color:#6b8f76}
.btn-dashed{width:100%;padding:8px;background:transparent;border:1px dashed #2d6a4f;border-radius:7px;color:#52b788;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-dashed:hover{background:rgba(45,106,79,.1)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#111c14;border:1px solid #2d6a4f;border-radius:13px;padding:24px;width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.modal-settings{border-color:#1a2e20;max-width:420px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-family:'Playfair Display',serif;font-size:19px;color:#e8f0eb}
.modal-close{background:none;border:none;color:#6b8f76;font-size:22px;cursor:pointer;line-height:1}
.field-label{font-size:11px;color:#6b8f76;text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;margin-bottom:5px;display:block}
.field-inp{width:100%;padding:9px 11px;background:#080d0b;border:1px solid #1a2e20;border-radius:7px;color:#e8f0eb;font-size:13px;font-family:'DM Sans',sans-serif}
.field-inp:focus{outline:none;border-color:#d4af37}
.form-grid{display:grid;grid-template-columns:1fr 2fr;gap:10px;margin-bottom:10px}
.form-grid-half{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{margin-bottom:10px}
.top10-row{display:flex;gap:7px}
.top10-btn{flex:1;padding:8px;background:rgba(255,255,255,.03);border:1px solid #1a2e20;border-radius:7px;color:#6b8f76;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.modal-footer{display:flex;justify-content:space-between;margin-top:18px}
.btn-del{padding:8px 14px;background:rgba(239,68,68,.1);border:1px solid #ef4444;border-radius:7px;color:#f87171;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-cancel{padding:8px 16px;background:transparent;border:1px solid #1a2e20;border-radius:7px;color:#6b8f76;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-save{padding:8px 20px;background:linear-gradient(135deg,#2d6a4f,#1a3c2e);border:none;border-radius:7px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-save:disabled{opacity:.45;cursor:not-allowed}
.btn-view-all{background:transparent;border:1px solid #1a2e20;color:#6b8f76;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-pick{font-size:11px;padding:3px 7px;background:transparent;border:1px solid #2d6a4f;border-radius:4px;color:#52b788;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-edit{padding:3px 9px;background:transparent;border:1px solid #1a2e20;border-radius:4px;color:#6b8f76;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif}
.btn-log-pick{padding:8px 16px;background:linear-gradient(135deg,#2d6a4f,#1a3c2e);border:none;border-radius:7px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.info-box{background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.2);border-radius:8px;padding:11px 13px;font-size:13px;color:#f5d97a;line-height:1.55;margin-bottom:16px}
.tier-legend{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}

/* ranker row */
.rank-num{font-family:'DM Mono',monospace;font-size:17px;font-weight:700;text-align:center;width:40px}
.rank-name{font-weight:600}
.rank-owgr{font-size:11px;color:#6b8f76;margin-top:1px}

/* player detail */
#player-panel{background:#0f1a14;border:1px solid #1a2e20;border-radius:11px;padding:16px;align-self:start;position:sticky;top:0;min-width:280px}
.stat-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.stat-mini{background:rgba(255,255,255,.03);border-radius:7px;padding:7px 9px}
.stat-mini-label{font-size:10px;color:#6b8f76}
.stat-mini-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;color:#d4af37;margin-top:1px}

/* pick log empty */
.empty-state{text-align:center;padding:52px;color:#6b8f76}
.empty-icon{font-size:42px;margin-bottom:10px;opacity:.15}

/* sg color coding */
.sg-great{color:#86efac;font-weight:700}
.sg-good{color:#fde68a}
.sg-ok{color:#e8f0eb}
.sg-bad{color:#f87171}
.mono{font-family:'DM Mono',monospace}
.gold{color:#d4af37}
.goldl{color:#f5d97a}
.muted{color:#6b8f76}
.green-txt{color:#86efac}
.red-txt{color:#ef4444}
.blue-txt{color:#60a5fa}
.pink-txt{color:#f472b6}

/* upcoming row */
.upcoming-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ai-note{font-size:12px;color:#f5d97a;margin-top:3px}

/* 5-col stat grid for picks view */
.stat-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}

/* 2-col overview grid */
.overview-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:15px}
.players-grid{display:grid;gap:15px}
.players-grid.with-panel{grid-template-columns:1fr 280px}
.players-grid.no-panel{grid-template-columns:1fr}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .32s ease forwards}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin 1s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="logo">
      <div class="logo-title">⛳ CADDIE</div>
      <div class="logo-sub">Golf Analytics</div>
    </div>
    <nav id="nav"></nav>
    <div class="season-box">
      <div style="font-size:11px;color:#6b8f76;text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;margin-bottom:9px">Season 2026</div>
      <div class="season-row"><span class="muted">Picks</span><span id="sb-picks">0</span></div>
      <div class="season-row"><span class="muted">Top 10s</span><span id="sb-t10s">0</span></div>
      <div class="season-row"><span class="muted">Hit Rate</span><span id="sb-rate">0%</span></div>
      <div class="season-row"><span class="muted">Points</span><span id="sb-pts">0</span></div>
      <div style="font-size:11px;color:#6b8f76;margin-top:4px" id="sb-remaining">15 picks remaining</div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-refresh" id="btn-refresh">🔄 Refresh Data</button>
      <button class="btn-settings" id="btn-settings">⚙️ API Settings <span id="key-check"></span></button>
      <div class="last-refresh" id="last-refresh"></div>
    </div>
  </aside>

  <div id="content">
    <div id="topbar">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <h1 style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700" id="page-title">Overview</h1>
          <div class="ai-note" id="ai-note" style="display:none"></div>
        </div>
        <div id="topbar-filters"></div>
      </div>
    </div>
    <div id="main"></div>
  </div>
</div>

<!-- PICK MODAL -->
<div class="overlay" id="pick-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Log a Pick</div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="form-grid">
      <div><label class="field-label">Week #</label><input class="field-inp" id="f-week" type="number" min="1" max="15"/></div>
      <div><label class="field-label">Tournament</label><input class="field-inp" id="f-tourn"/></div>
    </div>
    <div class="form-group">
      <label class="field-label">Player</label>
      <select class="field-inp" id="f-player"></select>
    </div>
    <div class="form-grid-half">
      <div><label class="field-label">Win Odds (e.g. +3000)</label><input class="field-inp" id="f-odds"/></div>
      <div><label class="field-label">Finish (e.g. 4, T6, CUT)</label><input class="field-inp" id="f-finish"/></div>
    </div>
    <div class="form-group">
      <label class="field-label">Top 10?</label>
      <div class="top10-row">
        <button class="top10-btn" data-val="Y" id="t10-y">✓ Yes</button>
        <button class="top10-btn" data-val="N" id="t10-n">✗ No</button>
        <button class="top10-btn active" data-val="" id="t10-p">— Pending</button>
      </div>
    </div>
    <div class="form-group">
      <label class="field-label">Notes</label>
      <input class="field-inp" id="f-notes"/>
    </div>
    <div class="modal-footer">
      <div><button class="btn-del" id="btn-del" style="display:none">Delete</button></div>
      <div style="display:flex;gap:8px">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-save" id="modal-save">Save Pick</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settings-modal" style="display:none">
  <div class="modal modal-settings">
    <div class="modal-header">
      <div class="modal-title">⚙️ API Settings</div>
      <button class="modal-close" id="settings-close">×</button>
    </div>
    <div class="info-box">Your key is saved only in <strong>your browser's local storage</strong> — it never leaves your device except to call Anthropic directly.</div>
    <div class="form-group">
      <label class="field-label">Anthropic API Key</label>
      <input class="field-inp" id="api-key-inp" type="password" placeholder="sk-ant-api03-…"/>
    </div>
    <div style="font-size:12px;color:#6b8f76;margin-bottom:18px">Get a free key at <strong style="color:#f5d97a">console.anthropic.com</strong> → API Keys</div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-cancel" id="settings-cancel">Cancel</button>
      <button class="btn-save" id="settings-save">Save Key</button>
    </div>
  </div>
</div>

// ── STORAGE ───────────────────────────────────────────────────────────────
function sGet(k){ try{ const v=localStorage.getItem("caddie_"+k); return v?JSON.parse(v):null; }catch{return null;} }
function sSet(k,v){ try{ localStorage.setItem("caddie_"+k,JSON.stringify(v)); }catch{} }

function loadState(){
  const p=sGet("picks"); if(p) state.picks=p;
  const r=sGet("ranker"); if(r) state.ranker=r;
  const n=sGet("note"); if(n) state.aiNote=n;
  const lr=sGet("lr"); if(lr) state.lastRefresh=lr;
  const k=sGet("apiKey"); if(k) state.apiKey=k;
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function el(tag,cls,html){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html!==undefined) e.innerHTML=html;
  return e;
}
function h(str){ return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function tierBadge(tier){
  const cls = TIERS[tier] || "tier-Value";
  return `<span class="tier ${cls}">${h(tier)}</span>`;
}
function usedBadge(){ return `<span class="used-badge">USED</span>`; }
function sgClass(v){ return v>0.8?"sg-great mono":v>0.3?"sg-good mono":v>0?"sg-ok mono":"sg-bad mono"; }
function calcStats(){
  const done=state.picks.filter(p=>p.finish);
  const t10s=done.filter(p=>p.top10==="Y").length;
  const rate=done.length?Math.round(t10s/done.length*100):0;
  const pts=done.reduce((s,p)=>{const f=parseInt(p.finish);return s+(f===1?25:p.top10==="Y"?10:0);},0);
  const wins=state.picks.filter(p=>p.finish==="1"||p.finish?.toLowerCase().startsWith("w")).length;
  return {done,t10s,rate,pts,wins,total:state.picks.length};
}
function usedNames(){ return state.picks.map(p=>p.player); }

// ── SIDEBAR ───────────────────────────────────────────────────────────────
function renderSidebar(){
  const navs=[
    {id:"overview",icon:"⊞",label:"Overview"},
    {id:"ranker",  icon:"🏆",label:"Ranker"},
    {id:"players", icon:"👥",label:"Players"},
    {id:"picks",   icon:"⭐",label:"My Picks"},
    {id:"schedule",icon:"📅",label:"Schedule"},
  ];
  const nav=document.getElementById("nav");
  nav.innerHTML="";
  navs.forEach(n=>{
    const btn=el("button","nav-btn"+(state.view===n.id?" active":""),`<span style="font-size:13px">${n.icon}</span>${h(n.label)}`);
    btn.onclick=()=>{ state.view=n.id; state.selPlayer=null; render(); };
    nav.appendChild(btn);
  });
  const st=calcStats();
  document.getElementById("sb-picks").textContent=st.total;
  document.getElementById("sb-t10s").textContent=st.t10s;
  document.getElementById("sb-rate").textContent=st.rate+"%";
  document.getElementById("sb-pts").textContent=st.pts;
  document.getElementById("sb-remaining").textContent=(15-st.total)+" picks remaining";
  document.getElementById("key-check").textContent=state.apiKey?"✓":"";
  document.getElementById("last-refresh").textContent=state.lastRefresh||"";
  const aiEl=document.getElementById("ai-note");
  if(state.aiNote){ aiEl.style.display="block"; aiEl.textContent="⚡ "+state.aiNote; }
  else aiEl.style.display="none";
}

  state.ranker.forEach((p,i)=>{

      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:15px;font-weight:700">${p.f} ${h(p.name)}</div>
          <div style="font-size:11px;color:#6b8f76;margin-top:2px">OWGR #${p.owgr} · ${p.tour} · Age ${p.age}</div>
        </div>
        <button id="close-panel" style="background:none;border:none;color:#6b8f76;font-size:20px;cursor:pointer;line-height:1">×</button>
      </div>
      ${renderRadar(p)}
      <div class="stat-mini-grid">
        ${[["SG Total",p.sg.toFixed(2)],["SG App",p.app.toFixed(2)],["Drive",p.drv+"y"],["GIR",p.gir+"%"],["Scoring",p.avg],["Fit",p.fit+"/10"],["Top-10%",p.prob+"%"],["Odds",p.odds]].map(([l,v])=>`
          <div class="stat-mini"><div class="stat-mini-label">${l}</div><div class="stat-mini-val">${h(String(v))}</div></div>
        `).join("")}
      </div>
      <div style="padding:8px 11px;background:rgba(212,175,55,.05);border-radius:7px;border:1px solid rgba(212,175,55,.18);margin-bottom:10px">
        <div style="font-size:10px;color:#6b8f76;margin-bottom:3px">TPC Sawgrass History</div>
        <div style="font-size:12px">Best: <strong style="color:${p.sb==="W"?"#d4af37":"#e8f0eb"}">${p.sb==="W"?"🏆 Winner":p.sb}</strong> · Avg: ${p.sa}</div>
      </div>
      ${!isUsed?`<button id="panel-pick-btn" style="width:100%;padding:9px;background:linear-gradient(135deg,#2d6a4f,#1a3c2e);border:none;border-radius:7px;color:#fff;font-weight:600;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif">+ Log Pick — ${h(p.name.split(" ").pop())}</button>`:""}
    </div>`;
  }
  html+=`</div>`;

  container.innerHTML=html;

  // events
  const si=container.querySelector("#player-search");
  if(si){ si.oninput=e=>{ state.search=e.target.value; renderPlayers(container); }; si.focus(); }

  container.querySelectorAll("th[data-k]").forEach(th=>{
    th.onclick=()=>{
      if(state.sortK===th.dataset.k) state.sortD=state.sortD==="asc"?"desc":"asc";
      else{ state.sortK=th.dataset.k; state.sortD="desc"; }
      renderPlayers(container);
    };
  });
  container.querySelectorAll("tr[data-pid]").forEach(tr=>{
    tr.onclick=(e)=>{
      if(e.target.closest("button")) return;
      const pid=parseInt(tr.dataset.pid);
      const pl=PLAYERS.find(p=>p.id===pid);
      state.selPlayer=(state.selPlayer?.id===pid)?null:pl;
      renderPlayers(container);
    };
  });
  container.querySelectorAll(".btn-pick-player").forEach(b=>{
    b.onclick=(e)=>{ e.stopPropagation(); openModal(null); };
  });
  const cp=container.querySelector("#close-panel");
  if(cp) cp.onclick=()=>{ state.selPlayer=null; renderPlayers(container); };
  const pp=container.querySelector("#panel-pick-btn");
  if(pp) pp.onclick=()=>openModal(null);
}

function renderRadar(p){
  const data=[
    {l:"SG Tot",v:Math.min(100,Math.max(0,(p.sg+0.5)/3*100))},
    {l:"App",   v:Math.min(100,Math.max(0,(p.app+0.3)/1.4*100))},
    {l:"OTT",   v:Math.min(100,Math.max(0,(p.ott+0.2)/1*100))},
    {l:"ATG",   v:Math.min(100,Math.max(0,(p.atg+0.1)/0.8*100))},
    {l:"Putt",  v:Math.min(100,Math.max(0,(p.putt+0.3)/0.8*100))},
    {l:"Fit",   v:p.fit/10*100},
  ];
  const n=data.length, cx=90, cy=90, r=60;
  const pts=data.map((d,i)=>{
    const a=(i/n)*Math.PI*2-Math.PI/2;
    const rv=d.v/100*r;
    return {x:cx+rv*Math.cos(a),y:cy+rv*Math.sin(a),lx:cx+(r+16)*Math.cos(a),ly:cy+(r+16)*Math.sin(a),l:d.l};
  });
  const polygon=pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const grids=[.25,.5,.75,1].map(f=>{
    const gp=data.map((_,i)=>{const a=(i/n)*Math.PI*2-Math.PI/2;return `${(cx+f*r*Math.cos(a)).toFixed(1)},${(cy+f*r*Math.sin(a)).toFixed(1)}`;});
    return `<polygon points="${gp.join(" ")}" fill="none" stroke="#1a2e20" stroke-width="1"/>`;
  }).join("");
  const axes=data.map((_,i)=>{const a=(i/n)*Math.PI*2-Math.PI/2;return `<line x1="${cx}" y1="${cy}" x2="${(cx+r*Math.cos(a)).toFixed(1)}" y2="${(cy+r*Math.sin(a)).toFixed(1)}" stroke="#1a2e20" stroke-width="1"/>`;}).join("");
  const labels=pts.map(p=>`<text x="${p.lx.toFixed(1)}" y="${p.ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#6b8f76" font-family="DM Sans,sans-serif">${p.l}</text>`).join("");
  return `<svg width="180" height="180" viewBox="0 0 180 180" style="display:block;margin:0 auto 10px">${grids}${axes}<polygon points="${polygon}" fill="rgba(212,175,55,0.15)" stroke="#d4af37" stroke-width="2"/>${labels}</svg>`;
}

function renderPicks(container){
  const st=calcStats();
  const stats=[
    {v:st.total,  l:"Picks Made",  c:"#60a5fa"},
    {v:st.t10s,   l:"Top 10s",     c:"#86efac"},
    {v:st.wins,   l:"Wins",        c:"#d4af37"},
    {v:st.rate+"%",l:"Hit Rate",   c:"#f472b6"},
    {v:st.pts,    l:"Season Pts",  c:"#34d399"},
  ];
  let html=`<div class="stat-grid-5">`;
  stats.forEach(s=>{
    html+=`<div class="stat-card" style="border-top:3px solid ${s.c}">
      <div class="stat-num" style="color:${s.c}">${s.v}</div>
      <div style="font-size:12px;color:#6b8f76;margin-top:4px">${s.l}</div>
    </div>`;
  });
  html+=`</div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h3 style="font-family:'Playfair Display',serif;font-size:17px">Pick Log</h3>
    <button class="btn-log-pick" id="btn-add-pick">+ Log Pick</button>
  </div>`;

  if(!state.picks.length){
    html+=`<div class="empty-state"><div class="empty-icon">⛳</div><div style="font-size:15px;margin-bottom:4px">No picks logged yet</div><div style="font-size:13px">Click "Log Pick" to get started</div></div>`;
  } else {
    html+=`<div class="panel"><table><thead><tr>
      <th>Wk</th><th>Tournament</th><th>Player</th><th>Odds</th>
      <th style="text-align:center">Finish</th><th style="text-align:center">Top 10</th>
      <th style="text-align:center">Points</th><th>Notes</th><th></th>
    </tr></thead><tbody>`;
    state.picks.forEach((p,i)=>{
      const isT10=p.top10==="Y";
      const isCut=["CUT","WD","DQ"].includes((p.finish||"").toUpperCase());
      const isWin=p.finish==="1"||(p.finish||"").toLowerCase().startsWith("w");
      const pts=isWin?25:isT10?10:0;
      html+=`<tr data-idx="${i}" style="background:${isT10?"rgba(82,183,136,.07)":isCut?"rgba(239,68,68,.05)":"transparent"}">
        <td class="mono" style="font-weight:600;color:#6b8f76">${p.week}</td>
        <td>${h(p.tournament||"")}</td>
        <td style="font-weight:600">${h(p.player||"")}</td>
        <td class="mono" style="font-size:12px;color:#6b8f76">${h(p.odds||"—")}</td>
        <td style="text-align:center;font-family:'DM Mono',monospace;font-weight:700;color:${isWin?"#d4af37":isCut?"#ef4444":"#6b8f76"}">${h(p.finish||"—")}</td>
        <td style="text-align:center;font-size:15px">${p.top10==="Y"?"✅":p.top10==="N"?"❌":"—"}</td>
        <td style="text-align:center;font-family:'DM Mono',monospace;font-weight:700;color:${pts>0?"#f5d97a":"#6b8f76"}">${pts>0?"+"+pts:"—"}</td>
        <td style="font-size:12px;color:#6b8f76;max-width:170px">${h(p.notes||"—")}</td>
        <td><button class="btn-edit" data-idx="${i}">Edit</button></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  container.innerHTML=html;
  const add=container.querySelector("#btn-add-pick");
  if(add) add.onclick=()=>openModal(null);
  container.querySelectorAll(".btn-edit[data-idx]").forEach(b=>{
    b.onclick=()=>openModal(null,parseInt(b.dataset.idx));
  });
}

function renderSchedule(container){
  let html=`<div class="sched-grid">`;
  SCHEDULE.forEach((s,i)=>{
    const pick=state.picks.find(p=>parseInt(p.week)===s.w);
    const isT10=pick?.top10==="Y";
    const isCut=["CUT","WD","DQ"].includes((pick?.finish||"").toUpperCase());
    const editIdx=pick?state.picks.indexOf(pick):-1;
    html+=`<div class="sched-card${s.major?" major":""}${s.curr?" curr":""} fu" style="animation-delay:${i*.04}s">
      ${s.major?`<div class="sched-tag major">MAJOR</div>`:""}
      ${s.curr&&!s.major?`<div class="sched-tag curr">THIS WEEK</div>`:""}
      <div class="week-label">WEEK ${s.w}</div>
      <div class="sched-name" style="color:${s.major?"#d4af37":"#e8f0eb"}">${h(s.name)}</div>
      <div class="sched-course">${h(s.course)} · ${s.dates}</div>
      ${pick?`
        <div class="pick-chip${isT10?" t10":isCut?" cut":""}">
          <div class="pick-chip-name">${h(pick.player)}</div>
          <div class="pick-chip-sub">
            ${pick.odds?`<span>${h(pick.odds)}</span>`:""}
            ${pick.finish?`<span style="color:${isT10?"#86efac":isCut?"#f87171":"#6b8f76"}">→ ${h(pick.finish)}</span>`:""}
            ${isT10?`<span style="color:#86efac">✓</span>`:""}
          </div>
          <button class="btn-edit" data-idx="${editIdx}" style="margin-top:6px">Edit</button>
        </div>
      `:`<button class="btn-dashed" data-week="${s.w}">+ Log Pick</button>`}
    </div>`;
  });
  html+=`</div>`;
  container.innerHTML=html;
  container.querySelectorAll(".btn-dashed[data-week]").forEach(b=>{
    b.onclick=()=>openModal(parseInt(b.dataset.week));
  });
  container.querySelectorAll(".btn-edit[data-idx]").forEach(b=>{
    b.onclick=()=>openModal(null,parseInt(b.dataset.idx));
  });
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────
function render(){
  renderSidebar();
  renderTopbar();
  const m=document.getElementById("main");
  if(state.view==="overview")  renderOverview(m);
  else if(state.view==="ranker")   renderRanker(m);
  else if(state.view==="players")  renderPlayers(m);
  else if(state.view==="picks")    renderPicks(m);
  else if(state.view==="schedule") renderSchedule(m);
}

// ── MODAL ─────────────────────────────────────────────────────────────────
let currentEditIdx=null;

function openModal(week, editIdx){
  currentEditIdx = (editIdx!==undefined&&editIdx!==null) ? editIdx : null;
  const isEdit = currentEditIdx!==null;
  document.getElementById("modal-title").textContent = isEdit?"Edit Pick":"Log a Pick";

  // populate player dropdown
  const sel=document.getElementById("f-player");
  sel.innerHTML=`<option value="">— Select player —</option>`;
  [...PLAYERS].sort((a,b)=>a.owgr-b.owgr).forEach(p=>{
    const o=document.createElement("option");
    o.value=p.name; o.textContent=`${p.f} #${p.owgr} ${p.name} (${p.tour}) — ${p.prob}% T10`;
    sel.appendChild(o);
  });

  if(isEdit){
    const pick=state.picks[currentEditIdx];
    document.getElementById("f-week").value=pick.week||"";
    document.getElementById("f-tourn").value=pick.tournament||"";
    sel.value=pick.player||"";
    document.getElementById("f-odds").value=pick.odds||"";
    document.getElementById("f-finish").value=pick.finish||"";
    document.getElementById("f-notes").value=pick.notes||"";
    setTop10(pick.top10||"");
    document.getElementById("btn-del").style.display="inline-block";
  } else {
    document.getElementById("f-week").value=week||"";
    const s=week?SCHEDULE.find(x=>x.w===week):null;
    document.getElementById("f-tourn").value=s?s.name:"";
    sel.value="";
    document.getElementById("f-odds").value="";
    document.getElementById("f-finish").value="";
    document.getElementById("f-notes").value="";
    setTop10("");
    document.getElementById("btn-del").style.display="none";
  }

  document.getElementById("pick-modal").style.display="flex";
}

function setTop10(val){
  state.top10Val=val;
  const cfg={
    "Y":  {color:"#86efac",bg:"rgba(82,183,136,.12)"},
    "N":  {color:"#f87171",bg:"rgba(239,68,68,.08)"},
    "":   {color:"#6b8f76",bg:"rgba(255,255,255,.03)"},
  };
  ["Y","N",""].forEach(v=>{
    const btn=document.getElementById("t10-"+{Y:"y",N:"n","":"p"}[v]);
    if(btn){
      const active=val===v;
      btn.style.background=active?cfg[v].bg:"rgba(255,255,255,.03)";
      btn.style.borderColor=active?cfg[v].color:"#1a2e20";
      btn.style.color=active?cfg[v].color:"#6b8f76";
    }
  });
}

function closeModal(){ document.getElementById("pick-modal").style.display="none"; }

function savePick(){
  const week=document.getElementById("f-week").value;
  const player=document.getElementById("f-player").value;
  if(!week||!player) return;
  const pick={
    week, player,
    tournament: document.getElementById("f-tourn").value,
    odds: document.getElementById("f-odds").value,
    finish: document.getElementById("f-finish").value,
    top10: state.top10Val,
    notes: document.getElementById("f-notes").value,
  };
  if(currentEditIdx!==null) state.picks[currentEditIdx]=pick;
  else state.picks.push(pick);
  sSet("picks",state.picks);
  closeModal();
  render();
}

// auto-fill tournament when week changes
document.getElementById("f-week").addEventListener("input",function(){
  const s=SCHEDULE.find(x=>x.w===parseInt(this.value));
  if(s) document.getElementById("f-tourn").value=s.name;
});

// top10 buttons
["y","n","p"].forEach(k=>{
  document.getElementById("t10-"+k).onclick=function(){
    setTop10(this.dataset.val);
  };
});
document.getElementById("modal-close").onclick=closeModal;
document.getElementById("modal-cancel").onclick=closeModal;
document.getElementById("modal-save").onclick=savePick;
document.getElementById("btn-del").onclick=function(){
  if(currentEditIdx!==null){
    state.picks.splice(currentEditIdx,1);
    sSet("picks",state.picks);
    closeModal();
    render();
  }
};
document.getElementById("pick-modal").onclick=function(e){
  if(e.target===this) closeModal();
};

// ── SETTINGS ──────────────────────────────────────────────────────────────
function openSettings(){
  document.getElementById("api-key-inp").value=state.apiKey||"";
  document.getElementById("settings-modal").style.display="flex";
}
function closeSettings(){ document.getElementById("settings-modal").style.display="none"; }

document.getElementById("btn-settings").onclick=openSettings;
document.getElementById("settings-close").onclick=closeSettings;
document.getElementById("settings-cancel").onclick=closeSettings;
document.getElementById("settings-modal").onclick=function(e){ if(e.target===this) closeSettings(); };
document.getElementById("settings-save").onclick=function(){
  const k=document.getElementById("api-key-inp").value.trim();
  state.apiKey=k; sSet("apiKey",k);
  closeSettings();
  renderSidebar();
};

// ── REFRESH ───────────────────────────────────────────────────────────────
document.getElementById("btn-refresh").onclick=async function(){
  if(!state.apiKey){ openSettings(); return; }
  const btn=this;
  btn.disabled=true;
  btn.innerHTML='<span class="spinning">🔄</span> Refreshing…';
  try{
    const used=usedNames();
    const usedStr=used.length?used.join(", "):"none";
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":state.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:
        `You are a PGA Tour analytics AI. Generate updated top-15 rankings for The Players Championship at TPC Sawgrass for a one-and-done pick'em bracket.\nAlready used picks: ${usedStr}\nKey stats: SG:Approach #1, GIR%, accuracy > distance, island 17th.\nReturn ONLY valid JSON (no markdown backticks):\n{"note":"1 sentence storyline","players":[{"rank":1,"name":"Full Name","tier":"Elite","prob":42,"odds":"+480","note":"under 10 words"}]}\nTiers: Elite, Contender, Hot Form, Sleeper, Value, LIV Watch, Specialist. Exactly 15 players. prob is an integer. Mark used picks note with ⚠️ USED prefix.`
      }]})
    });
    const d=await res.json();
    const txt=(d.content||[]).map(b=>b.text||"").join("");
    const m=txt.match(/\{[\s\S]*\}/);
    if(m){
      const parsed=JSON.parse(m[0]);
      if(parsed.players?.length){
        state.ranker=parsed.players; sSet("ranker",parsed.players);
        state.aiNote=parsed.note||""; sSet("note",state.aiNote);
        const now=new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})+" · "+new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
        state.lastRefresh=now; sSet("lr",now);
      }
    }
  }catch(e){ state.aiNote="Error — check API key in Settings."; }
  btn.disabled=false;
  btn.innerHTML='🔄 Refresh Data';
  render();
};

// ── BOOT ──────────────────────────────────────────────────────────────────
loadState();
render();
</script>
